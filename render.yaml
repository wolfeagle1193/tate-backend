services:
  - type: web
    name: tate-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # à saisir dans le dashboard Render
      - key: JWT_SECRET
        generateValue: true  # Render génère automatiquement
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ANTHROPIC_API_KEY
        sync: false          # à saisir dans le dashboard Render
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NOM
        value: Administrateur Taté
      - key: FRONTEND_URL
        sync: false          # URL Vercel, ex: https://tate.vercel.app
